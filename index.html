<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<meta http-equiv="X-UA-Compatible" content="ie=edge">
	<title>NotePocket</title>
	<link rel="stylesheet" href="styles/styles.css" />
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@0.8.0/css/bulma.min.css">
	<script defer src="https://use.fontawesome.com/releases/v5.3.1/js/all.js"></script>
</head>

<body>
	<aside></aside>
	<main>
		<div id="note-excerpt"></div>
		<div id="note-content">

			<div class="field is-horizontal">

				<div class="field-body">
					<div class="field">
						<div class="control">
							<textarea id="note-title-textarea" type="text" rows="1" maxlength="50" placeholder="Title"></textarea>
						</div>

					</div>
				</div>
			</div>

			<div class="field is-horizontal">

				<div class="field-body">
					<div class="field">
						<div class="control">
							<textarea id="note-content-textarea" placeholder="Content"></textarea>
						</div>
					</div>
				</div>
			</div>

			<div class="field is-horizontal">
				<div class="field-label">
				</div>
				<div class="field-body">
					<div class="field">
						<div class="control">
							<button class="button is-primary" id="save-note">
								Save note
							</button>
						</div>
					</div>
				</div>

			</div>

	</main>
	<script type="module" src="src/main.js"></script>
</body>

</html>
